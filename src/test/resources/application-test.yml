spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      continue-on-error: false

  datasource:
    url: jdbc:h2:mem:compensation_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.yiyundao.compensation: DEBUG
    com.baomidou.mybatisplus: INFO

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

file-storage:
  active: local
  max-file-size: 10485760
  allowed-extensions:
    - jpg
    - jpeg
    - png
    - gif
    - pdf
    - txt
  local:
    base-path: /tmp/compensation-test-files
    base-url: http://localhost:8080/files

security:
  sensitive:
    enabled: true

jwt:
  secret: "test-secret-key-please-change-to-32-bytes-minimum"
  expiration: 3600000
  refresh-expiration: 604800000

external-api:
  jwt:
    secret: "external-api-secret-key-must-be-32-bytes-123"
    expiration-seconds: 600
