spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://staging-db-host:3306/compensation_staging?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 1
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD}}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 2

  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /compensation-staging

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# 加密配置
encryption:
  sm4:
    key: ${SM4_KEY}
  aes:
    key: ${AES_KEY}

# 日志配置
logging:
  level:
    root: INFO
    com.yiyundao.compensation: DEBUG
  file:
    name: logs/compensation-staging.log
    max-size: 100MB
    max-history: 30

external-api:
  jwt:
    secret: ${EXTERNAL_API_JWT_SECRET}
    expiration-seconds: ${EXTERNAL_API_JWT_EXPIRATION:1800}
  rate-limit:
    per-minute: ${EXTERNAL_API_RATE_LIMIT_PER_MINUTE:600}
    alert-cooldown-seconds: ${EXTERNAL_API_RATE_LIMIT_ALERT_COOLDOWN:300}

legacy:
  platform-field:
    mode: reject
    workflow-data-mode: reject
