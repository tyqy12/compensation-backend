spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境保持与开发一致（按需求指定同一数据库）
    url: jdbc:mysql://47.93.215.12:3306/s06?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: s06
    password: 123456
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# Alipay配置（生产环境）
alipay:
  app-id: ${ALIPAY_APP_ID}
  server-url: https://openapi.alipay.com/gateway.do
  private-key: ${ALIPAY_PRIVATE_KEY}
  public-key: ${ALIPAY_PUBLIC_KEY}
  charset: UTF-8
  sign-type: RSA2
  format: json
  notify-url: https://compensation.yiyundao.com/api/alipay/notify
  return-url: https://compensation.yiyundao.com/api/alipay/return

# 企业微信配置
wechat:
  corp-id: wwa45e13d8804607c0
  corp-secret: vGSzMAl6EPPHvxnn7JRH7hXqqpP_jg0jfmP-k6-3nGk
  agent-id: 1000003

# 钉钉配置
dingtalk:
  app-key: your_app_key
  app-secret: your_app_secret

# 飞书配置
feishu:
  app-id: your_app_id
  app-secret: your_app_secret

# 短信配置
sms:
  access-key-id: ${SMS_ACCESS_KEY_ID}
  access-key-secret: ${SMS_ACCESS_KEY_SECRET}
  sign-name: 薪酬助手
  template-code: ${SMS_TEMPLATE_CODE}

# 加密配置
encryption:
  sm4:
    key: your_sm4_key_32_chars_long_here
  aes:
    key: your_aes_key_32_chars_long_here

# 日志配置
logging:
  level:
    root: WARN
    com.yiyundao.compensation: INFO
  file:
    name: /var/log/compensation/compensation-prod.log
    max-size: 100MB
    max-history: 90

# 服务器配置
server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10

external-api:
  jwt:
    secret: ${EXTERNAL_API_JWT_SECRET}
    expiration-seconds: ${EXTERNAL_API_JWT_EXPIRATION:1800}
  rate-limit:
    per-minute: ${EXTERNAL_API_RATE_LIMIT_PER_MINUTE:600}
    alert-cooldown-seconds: ${EXTERNAL_API_RATE_LIMIT_ALERT_COOLDOWN:300}
