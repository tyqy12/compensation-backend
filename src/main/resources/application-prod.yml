spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:}
    password: ${SPRING_RABBITMQ_PASSWORD:}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        auto-startup: ${SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP:false}

server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:10}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

encryption:
  sm4:
    key: ${ENCRYPTION_SM4_KEY}
    keyring: ${ENCRYPTION_SM4_KEYRING:}
  aes:
    key: ${ENCRYPTION_AES_KEY}
    key-id: ${ENCRYPTION_AES_KEY_ID:env-current}
    keyring: ${ENCRYPTION_AES_KEYRING:}

logging:
  level:
    root: INFO
    com.yiyundao.compensation: INFO
    com.baomidou.mybatisplus: WARN
    org.springframework.security: WARN
  file:
    name: /var/log/compensation/compensation-prod.log
    max-size: 100MB
    max-history: 90

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      show-details: never

tracing:
  sampling:
    probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    enabled: ${TRACING_ZIPKIN_ENABLED:false}
    base-url: ${TRACING_ZIPKIN_BASE_URL:http://zipkin:9411}

oauth:
  trusted-redirect-hosts: ${OAUTH_TRUSTED_REDIRECT_HOSTS}

file-storage:
  active: ${FILE_STORAGE_ACTIVE:local}
  local:
    base-path: ${FILE_STORAGE_LOCAL_BASE_PATH:/var/lib/compensation/files}

migration:
  runner:
    enabled: ${MIGRATION_RUNNER_ENABLED:true}

legacy:
  platform-field:
    mode: reject
    workflow-data-mode: reject

external-api:
  jwt:
    secret: ${EXTERNAL_API_JWT_SECRET}
    expiration-seconds: ${EXTERNAL_API_JWT_EXPIRATION:1800}
  rate-limit:
    per-minute: ${EXTERNAL_API_RATE_LIMIT_PER_MINUTE:600}
    alert-cooldown-seconds: ${EXTERNAL_API_RATE_LIMIT_ALERT_COOLDOWN:300}

payroll:
  compliance:
    allow-template-fallback: false
    allow-builtin-tax-fallback: false
