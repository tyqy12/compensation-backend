spring:
  config:
    import: optional:file:./application-local.yml
  main:
    allow-circular-references: true
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://47.93.215.12:3306/s06?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: s06
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 支持 Spring Boot 标准变量，并兼容现有的 REDIS_PASSWORD 配置。
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# JWT配置
jwt:
  secret: ${JWT_SECRET:change-me-dev-jwt-secret-key-at-least-32-chars}
  expiration: 86400000
  refresh-expiration: 604800000

# 加密配置
encryption:
  sm4:
    key: your_sm4_key_32_chars_long_here
  aes:
    key: your_aes_key_32_chars_long_here

external-api:
  jwt:
    secret: ${EXTERNAL_API_JWT_SECRET:change-me-external-api-secret-at-least-32-chars}
    expiration-seconds: 1800
  rate-limit:
    per-minute: 600
    alert-cooldown-seconds: 300

legacy:
  platform-field:
    mode: reject
    workflow-data-mode: reject

file-storage:
  local:
    base-path: ${FILE_STORAGE_LOCAL_BASE_PATH:${user.home}/.compensation/files}
