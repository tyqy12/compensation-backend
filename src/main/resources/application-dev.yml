spring:
  config:
    import: optional:file:./application-local.yml
  main:
    allow-circular-references: false
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 支持 Spring Boot 标准变量，并兼容现有的 REDIS_PASSWORD 配置。
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# 加密配置
encryption:
  sm4:
    key: ${ENCRYPTION_SM4_KEY}
    keyring: ${ENCRYPTION_SM4_KEYRING:}
  aes:
    key: ${ENCRYPTION_AES_KEY}
    key-id: ${ENCRYPTION_AES_KEY_ID:dev-current}
    keyring: ${ENCRYPTION_AES_KEYRING:}

external-api:
  jwt:
    secret: ${EXTERNAL_API_JWT_SECRET}
    expiration-seconds: 1800
  rate-limit:
    per-minute: 600
    alert-cooldown-seconds: 300

security:
  dev-token:
    enabled: ${DEV_TOKEN_ENABLED:false}

legacy:
  platform-field:
    mode: reject
    workflow-data-mode: reject

file-storage:
  local:
    base-path: ${FILE_STORAGE_LOCAL_BASE_PATH:${user.home}/.compensation/files}
