spring:
  application:
    name: compensation-assistant-system
  profiles:
    active: dev

  # AOP配置
  aop:
    proxy-target-class: true
    expose-proxy: true

server:
  servlet:
    context-path: /api

  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yiyundao.compensation.modules.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
      select-strategy: not_empty

# 日志配置
logging:
  level:
    com.yiyundao.compensation: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{50} - %msg%n"

# ==================== 监控配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}

# ==================== 链路追踪配置 ====================
tracing:
  sampling:
    probability: 1.0
  propagation:
    type: b3
  zipkin:
    enabled: true
    base-url: http://localhost:9411
    service-name: compensation-backend

# ==================== 调度任务配置 ====================
task:
  scheduler:
    pool-size: 5
    thread-name-prefix: task-scheduler-

payment:
  reconciliation:
    enabled: true
    fixed-delay-ms: 300000
    initial-delay-ms: 120000
    batch-limit: 20
    record-limit-per-batch: 200

# ==================== OAuth 配置 ====================
oauth:
  trusted-redirect-hosts: localhost:5173,127.0.0.1:5173,localhost:3000,127.0.0.1:3000

# 旧平台字段渐进下线策略:
# compat: 接受旧字段
# warn: 接受旧字段并告警（默认）
# reject: 拒绝旧字段输入
legacy:
  platform-field:
    mode: warn
    workflow-data-mode: warn
